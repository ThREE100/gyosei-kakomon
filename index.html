<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f6feb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="行政書士過去問">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="stylesheet" href="style.css">
<title>行政書士 過去問演習</title>
</head>
<body>
<header id="appbar">
  <button id="homeBtn" class="ghost" hidden>‹ ホーム</button>
  <h1>行政書士 過去問演習</h1>
  <button id="logoutBtn" class="ghost small" hidden>ログアウト</button>
</header>

<!-- ログイン画面 -->
<main id="loginApp">
  <section id="loginScreen" class="screen">
    <div class="panel" style="max-width:360px;margin:auto">
      <h2 style="margin-bottom:.5rem">行政書士 過去問演習</h2>
      <p class="muted" style="margin-bottom:1.2rem">メールアドレスにマジックリンクを送ります</p>
      <label>メールアドレス
        <input type="email" id="emailInput" placeholder="example@email.com" autocomplete="email" />
      </label>
      <button id="sendMagicBtn" class="primary" style="margin-top:.8rem">マジックリンクを送る</button>
      <p id="loginMsg" class="muted" style="margin-top:.8rem"></p>
    </div>
  </section>
</main>

<main id="app" hidden>
  <!-- ホーム -->
  <section id="home" class="screen">
    <button id="reviewCard" class="review-card" hidden>
      <span class="review-left">
        <span class="review-emoji">📆</span>
        <span>
          <span class="review-title">今日の復習</span>
          <span class="review-sub">忘れた頃の問題を出題します</span>
        </span>
      </span>
      <span class="review-num"><b id="dueCount">0</b> 問 ›</span>
    </button>

    <div class="modes">
      <button class="mode-card" data-mode="oneliner">
        <span class="mode-title">一問一答</span>
        <span class="mode-sub">○× / 肢別 <b id="cntOne">–</b>問</span>
      </button>
      <button class="mode-card" data-mode="exam">
        <span class="mode-title">本試験形式</span>
        <span class="mode-sub">5択・多肢 / <b id="cntExam">–</b>問</span>
      </button>
    </div>

    <div class="panel">
      <h2>出題条件</h2>
      <label>科目
        <select id="fSubject"><option value="">すべて</option></select>
      </label>
      <label id="yearWrap" hidden>年度
        <select id="fYear"><option value="">すべて</option></select>
      </label>
      <label>範囲
        <select id="fScope">
          <option value="all">すべて</option>
          <option value="unseen">未挑戦のみ</option>
          <option value="wrong">間違えた問題(復習)</option>
        </select>
      </label>
      <label>出題順
        <select id="fOrder">
          <option value="seq">順番どおり</option>
          <option value="shuffle">シャッフル</option>
        </select>
      </label>
      <label>問題数
        <select id="fCount">
          <option value="10">10問</option>
          <option value="20" selected>20問</option>
          <option value="50">50問</option>
          <option value="0">すべて</option>
        </select>
      </label>
      <button id="startBtn" class="primary">開始する</button>
      <p id="poolInfo" class="muted"></p>
    </div>

    <div class="panel">
      <h2>📅 学習記録</h2>
      <div class="log-row">
        <span>今日の学習</span>
        <span><b id="logTodayMin">0</b> / <span id="logTodayTarget">180</span>分</span>
      </div>
      <div class="bar log-bar"><span id="logTodayBar" style="width:0%"></span></div>
      <div class="log-btns">
        <button data-min="15">+15分</button>
        <button data-min="30">+30分</button>
        <button data-min="60">+60分</button>
        <button data-min="-15" class="minus">−15分</button>
      </div>
      <p class="muted small" style="margin:6px 0 0">解いた問題 <b id="logTodayAns">0</b>問（自動）</p>
      <div class="log-stats">
        <div class="stat"><span class="v" id="logStreak">0</span><span class="k">🔥連続日</span></div>
        <div class="stat"><span class="v" id="logWeek">0h</span><span class="k">今週 / 20h</span></div>
        <div class="stat"><span class="v" id="logTotal">0h</span><span class="k">累計 / 408h</span></div>
      </div>
      <p class="muted small" id="logPhase" style="margin:10px 0 6px"></p>
      <div class="log-cal" id="logCal"></div>
    </div>

    <div class="panel">
      <h2>学習状況</h2>
      <div id="statsBox" class="stats"></div>
      <button id="resetBtn" class="ghost danger">学習記録をリセット</button>
    </div>
    <p class="muted small">出典: 一般財団法人 行政書士試験研究センター 公開の過去問題・正解（個人学習用）。問題1・58〜60等、著作権配慮で非掲載の問題は含みません。</p>
  </section>

  <!-- 演習 -->
  <section id="quiz" class="screen" hidden>
    <div class="qbar">
      <span id="qProgress" class="muted"></span>
      <span id="qBadge" class="badge"></span>
    </div>
    <div id="qText" class="qtext"></div>
    <div id="qChoices" class="choices"></div>
    <div id="qFeedback" class="feedback" hidden></div>
    <div class="qactions">
      <button id="nextBtn" class="primary" hidden>次へ ›</button>
    </div>
  </section>

  <!-- 結果 -->
  <section id="result" class="screen" hidden>
    <h2>結果</h2>
    <div id="resScore" class="resscore"></div>
    <div id="resList" class="reslist"></div>
    <div class="qactions">
      <button id="reviewWrongBtn" class="primary" hidden>間違えた問題を復習</button>
      <button id="backHomeBtn" class="ghost">ホームへ</button>
    </div>
  </section>
</main><!-- #app -->

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
